name: 'Ops: Deploy (Cloudflare Pages)'

# Builds in GitHub Actions (where the private @rabestro/dicechess-engine installs via
# GITHUB_TOKEN) and uploads the static dist/ to a Cloudflare Pages "Direct Upload"
# project. The browser never needs the engine token; Cloudflare never needs a packages PAT.
#
# Requires two repo secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN  — token with the "Cloudflare Pages: Edit" permission
#   CLOUDFLARE_ACCOUNT_ID — your Cloudflare account id
#
# Manual-only for now. Once the secrets exist and a deploy looks good, enable continuous
# deploy by uncommenting the `push` trigger below.
on:
  workflow_dispatch:
  # push:
  #   branches: [main]

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup mise
        uses: jdx/mise-action@v4

      - name: Install dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=dicechess-play --branch=main
