name: 'Ops: Deploy (Cloudflare Pages)'

# Builds in GitHub Actions (where the private @rabestro/dicechess-engine installs via
# GITHUB_TOKEN) and uploads the static dist/ to a Cloudflare Pages "Direct Upload"
# project. The browser never needs the engine token; Cloudflare never needs a packages PAT.
#
# Requires two repo secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN  — token with the "Cloudflare Pages: Edit" permission
#   CLOUDFLARE_ACCOUNT_ID — your Cloudflare account id
#
# Auto-deploys on every push to main; also runnable manually.
on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  packages: read # GITHUB_TOKEN needs this to install @rabestro/dicechess-engine

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup mise
        uses: jdx/mise-action@v4

      - name: Install dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: npm run build
        env:
          # Public URL of the ingest gateway, baked into the bundle at build time.
          # Set it as a repo VARIABLE (Settings → Secrets and variables → Actions →
          # Variables → VITE_INGEST_GATEWAY_URL). Empty = recording disabled (games
          # stay in IndexedDB). Changing it requires a rebuild + redeploy.
          VITE_INGEST_GATEWAY_URL: ${{ vars.VITE_INGEST_GATEWAY_URL }}

      # wrangler pages deploy does not auto-create the project; create it once
      # (no-op / harmless error if it already exists, hence `|| true`).
      - name: Ensure Pages project exists
        run: npx --yes wrangler pages project create dicechess-play --production-branch=main || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=dicechess-play --branch=main
