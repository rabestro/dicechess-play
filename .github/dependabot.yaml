version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'wednesday'
      time: '08:00'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
    commit-message:
      prefix: 'chore'
      include: 'scope'
    assignees:
      - 'rabestro'
    rebase-strategy: 'auto'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'tuesday'
      time: '08:00'
    open-pull-requests-limit: 5
    labels:
      - 'ci-cd'
    commit-message:
      prefix: 'chore'
    assignees:
      - 'rabestro'
